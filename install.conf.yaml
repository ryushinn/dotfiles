- defaults:
    link:
      relink: true
      create: true

- create: ["~/.ssh"]

- clean: ['~', '~/.ssh']

- link:
    ~/.dotfiles: "" # symlink a fixed path for all dotfiles

    # general shell
    ~/.shell:

    # zsh
    ~/.zshrc:
    ~/.oh-my-zsh:

    # p10k prompt config
    ~/.p10k.zsh:

    # git
    ~/.gitconfig:
    ~/.gitignore:

    # vim
    ~/.vimrc:

    # ssh
    ~/.ssh/config: ssh/config

    # tmux
    ~/.tmux.conf:

# link oh-my-zsh custom plugins and themes
- link:
    ~/.oh-my-zsh/custom/plugins/zsh-autosuggestions: omz-custom-plugins/zsh-autosuggestions
    ~/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting: omz-custom-plugins/zsh-syntax-highlighting
    ~/.oh-my-zsh/custom/themes/powerlevel10k: powerlevel10k

- shell: []
